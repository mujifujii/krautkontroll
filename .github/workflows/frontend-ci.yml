name: Frontend CI

# Continuous Integration fuer das Angular-Frontend.
# Laeuft nur bei Aenderungen unter frontend/ (Monorepo-Path-Filter) –
# Backend-Commits triggern stattdessen ci.yml.
on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

# Alle run-Schritte arbeiten im frontend/-Unterordner.
defaults:
  run:
    working-directory: frontend

jobs:
  # ---------------------------------------------------------------------------
  # Lint + Build als QS-Gate. Unit-Tests bewusst NICHT im Scope (Fokus der
  # Tests liegt auf der Backend-Logik); ng build faengt Typ-/Template-Fehler ab.
  # ---------------------------------------------------------------------------
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Abhängigkeiten installieren (reproduzierbar)
        run: npm ci

      - name: Lint (ESLint)
        run: npx ng lint

      - name: Build (Produktion)
        run: npx ng build --configuration production

      - name: dist/ als Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: warn
